name: CI

on:
  pull_request:
  push:
    branches: [dev, main]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - name: Install HDL tools
        run: sudo apt-get update && sudo apt-get install --yes iverilog verilator
      - name: Build and test C utilities
        run: make -C sw test
      - name: Run HDL tests and lint
        run: bash scripts/test-hdl.sh
      - name: Scan tracked files for credentials and local paths
        run: |
          ! git grep -nEI '(gh[pousr]_[A-Za-z0-9_]{20,}|AKIA[0-9A-Z]{16}|-----BEGIN (RSA|OPENSSH|EC|PRIVATE) KEY-----|[A-Za-z]:\\Users\\|1[3-9][0-9]{9}|[0-9]{6,}@[A-Za-z0-9.-]+)' -- ':!.github/workflows/ci.yml' ':!.github/workflows/security-review.yml'
